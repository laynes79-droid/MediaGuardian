# This file is used to configure Gradle build properties.

# Enables the use of AndroidX libraries. This is mandatory for modern Android projects.
android.useAndroidX=true

# Enables Jetifier, which automatically migrates third-party dependencies to use AndroidX.
android.enableJetifier=true

# Increases the maximum memory heap size for the Gradle Daemon to prevent OutOfMemoryErrors.
# 2 GB should be sufficient for this project.
org.gradle.jvmargs=-Xmx2048m -Dfile.encoding=UTF-8
